name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test-scan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # Change this if you use a different Python version

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # Install testing and linting tools
        pip install pytest httpx flake8 bandit
        # Install project requirements (assuming you have a requirements.txt)
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Lint with Flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Treat all other issues as warnings
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Security Scan with Bandit
      run: |
        # Run bandit security scanner, excluding the tests directory
        bandit -r . -ll -ii -x ./tests

    - name: Run Smoke Tests with Pytest
      run: |
        # Make sure your test file is in a folder named 'tests'
        pytest tests/
      env:
        # If your API needs specific environment variables to run locally during tests, add them here
        # DATABASE_URL: "sqlite:///:memory:"
        ENVIRONMENT: "testing"

    - name: Trigger Render Deploy
      if: success() # Only deploys if all tests pass
      run: |
        curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
